<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Mundial 2026"/>
<title>Caderneta Mundial 2026</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192x192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#0a0a0f;min-height:100vh;font-family:'Rajdhani',sans-serif;color:#e8eaf0;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{display:none}
#app{max-width:430px;margin:0 auto;min-height:100vh}

/* в•җв•җв•җ HEADER в•җв•җв•җ */
#hdr{
  position:sticky;top:0;z-index:100;
  background:linear-gradient(180deg,#0f0f1a 0%,#0a0a14 100%);
  border-bottom:2px solid transparent;
  border-image:linear-gradient(90deg,transparent,#ffd700,#ff8c00,#ffd700,transparent) 1;
  padding:10px 14px 8px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 30px rgba(0,0,0,.8)}
#hdr-icon{font-size:28px;line-height:1;flex-shrink:0}
#hdr-title{flex:1}
#hdr-title h1{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:4px;
  background:linear-gradient(135deg,#ffd700 0%,#ffb300 50%,#ff8c00 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:1px}
#hdr-title p{font-size:9px;color:#3a4060;letter-spacing:3px;text-transform:uppercase;font-weight:600}
#hdr-right{text-align:right;flex-shrink:0}
#hdr-pct{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;
  background:linear-gradient(135deg,#ffd700,#ff8c00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
#hdr-count{font-size:9px;color:#3a4060;letter-spacing:.5px;margin-top:1px}

/* в•җв•җв•җ NAV в•җв•җв•җ */
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:#080810;
  border-top:1px solid #1a1a2e;
  display:grid;grid-template-columns:repeat(4,1fr);
  z-index:100;padding:6px 6px calc(6px + env(safe-area-inset-bottom))}
.nb{background:none;border:none;color:#2a2a40;cursor:pointer;
  padding:7px 2px 5px;border-radius:8px;
  font-family:'Rajdhani',sans-serif;font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s}
.nb-ico{font-size:20px;line-height:1}
.nb.on{color:#ffd700}
.nb.on .nb-bar{width:18px;height:2px;border-radius:1px;
  background:linear-gradient(90deg,#ffd700,#ff8c00);margin-top:1px}
.nb:not(.on) .nb-bar{display:none}

/* в•җв•җв•җ CONTENT в•җв•җв•җ */
#pg{padding:10px 10px 76px;position:relative}

/* в•җв•җв•җ HERO CARD в•җв•җв•җ */
.hero{
  border-radius:16px;padding:0;margin-bottom:10px;overflow:hidden;
  background:linear-gradient(145deg,#0d0d20,#141428,#0f0f1c);
  border:1px solid #1e1e38;
  box-shadow:0 8px 40px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.04)}
.hero-top{
  padding:18px 18px 14px;
  background:radial-gradient(ellipse 120% 80% at 50% -10%,rgba(255,180,0,.12) 0%,transparent 60%)}
.hero-ring-wrap{display:flex;justify-content:center;margin-bottom:14px;position:relative}
.hero-ring-wrap svg{display:block;filter:drop-shadow(0 0 12px rgba(255,180,0,.3))}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;
  background:linear-gradient(135deg,#ffd700,#ff8c00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.ring-sub{font-size:8px;color:#3a4060;letter-spacing:2px;margin-top:2px}
.hero-counts{display:flex;align-items:baseline;justify-content:center;gap:6px;margin-bottom:12px}
.hero-big{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;color:#00e676;line-height:1}
.hero-of{font-size:14px;color:#3a4060;letter-spacing:.5px}
.hero-pills{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.pill{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.pill-g{background:rgba(0,230,118,.1);color:#00e676;border:1px solid rgba(0,230,118,.25)}
.pill-r{background:rgba(229,57,53,.1);color:#ef5350;border:1px solid rgba(229,57,53,.2)}
.pill-o{background:rgba(255,152,0,.1);color:#ffa726;border:1px solid rgba(255,152,0,.2)}

/* в•җв•җв•җ STAT ROW в•җв•җв•җ */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-box{
  background:linear-gradient(145deg,#0d0d20,#0f0f1c);
  border:1px solid #1a1a30;border-radius:12px;
  padding:12px;display:flex;align-items:center;gap:10px}
.stat-box.clickable{cursor:pointer}
.stat-box.clickable:active{transform:scale(.97)}
.stat-ico{font-size:24px;flex-shrink:0}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;line-height:1}
.stat-l{font-size:9px;color:#3a4060;letter-spacing:.5px;text-transform:uppercase;margin-top:2px}

/* в•җв•җв•җ SECTION HEADER в•җв•җв•җ */
.sh{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sh-txt{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:#2a2a45;white-space:nowrap}
.sh-line{flex:1;height:1px;background:linear-gradient(90deg,#1a1a2e,transparent)}

/* в•җв•җв•җ GROUP GRID в•җв•җв•җ */
.gg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.gt{
  background:linear-gradient(145deg,#0d0d1e,#0f0f1a);
  border:1px solid #1a1a2e;border-radius:10px;
  padding:10px 6px;text-align:center;cursor:pointer;transition:all .12s;position:relative}
.gt:active{transform:scale(.95)}
.gt-l{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1;margin-bottom:3px}
.gt-s{font-size:9px;color:#2a2a40;letter-spacing:.3px;margin-bottom:4px}
.gt-d{font-size:8px;color:#ff8c00;margin-bottom:2px}
.pb{height:3px;background:#111120;border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px;transition:width .5s}

/* в•җв•җв•җ LIST ITEMS вҖ” Groups page в•җв•җв•җ */
.li{
  background:linear-gradient(135deg,#0d0d1e 0%,#0f0f1a 100%);
  border:1px solid #1a1a2e;border-radius:10px;
  padding:12px 14px;margin-bottom:6px;cursor:pointer;
  display:flex;align-items:center;gap:12px;transition:all .1s}
.li:active{transform:scale(.98)}
.li-badge{
  width:40px;height:40px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.li-body{flex:1;min-width:0}
.li-flags{font-size:10px;color:#2a2a40;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-pr{display:flex;align-items:center;gap:8px}
.pbt{flex:1;height:4px;background:#111120;border-radius:2px;overflow:hidden}
.pbf{height:100%;border-radius:2px}
.li-sc{font-size:10px;color:#2a2a40;min-width:34px;text-align:right}
.li-dup{font-size:9px;color:#ff8c00}
.li-arr{color:#1a1a30;font-size:16px}

/* в•җв•җв•җ TEAM CARDS в•җв•җв•җ */
.tc{
  background:linear-gradient(135deg,#0d0d1e,#0f0f1a);
  border:1px solid #1a1a2e;border-radius:10px;
  margin-bottom:6px;cursor:pointer;
  display:flex;align-items:stretch;overflow:hidden;transition:all .1s}
.tc:active{transform:scale(.98)}
.tc-flag{
  padding:0 14px;font-size:30px;
  display:flex;align-items:center;
  background:linear-gradient(135deg,rgba(255,255,255,.02),transparent);
  border-right:1px solid #111120}
.tc-body{flex:1;padding:11px 12px}
.tc-name{font-weight:700;font-size:13px;letter-spacing:.5px;margin-bottom:5px;
  display:flex;align-items:center;gap:7px}
.tc-dp{font-size:9px;color:#ff8c00;background:rgba(255,140,0,.1);border:1px solid rgba(255,140,0,.2);border-radius:10px;padding:1px 6px}
.tc-arr{padding:0 12px;display:flex;align-items:center;color:#1a1a30;font-size:16px}

/* в•җв•җв•җ STICKER ROWS в•җв•җв•җ */
.page-hd{
  font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;margin-bottom:12px;
  background:linear-gradient(135deg,#ffd700,#ff8c00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.back{
  display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;
  background:#0d0d1e;border:1px solid #1a1a2e;border-radius:8px;
  color:#ffd700;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:6px 12px;cursor:pointer;font-family:'Rajdhani',sans-serif;transition:all .12s}
.back:active{transform:scale(.97)}

.sr{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:8px;margin-bottom:3px;
  cursor:pointer;transition:all .08s;border:1px solid transparent}
.sr.have{background:rgba(0,230,118,.06);border-color:rgba(0,230,118,.15)}
.sr.miss{background:rgba(255,255,255,.015);border-color:rgba(255,255,255,.04)}
.sr.dup{background:rgba(255,140,0,.06);border-color:rgba(255,140,0,.15)}
.sr:active{transform:scale(.97)}

.sd{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.sd.h{background:rgba(0,230,118,.18);border:1px solid rgba(0,230,118,.4);color:#00e676}
.sd.m{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:#1a1a2e}
.sd.f{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.25);color:#ffd700}
.sd.mf{background:rgba(183,148,244,.08);border:1px solid rgba(183,148,244,.2);color:#b794f4}
.sr-id{font-size:10px;font-weight:700;color:#2a3050;min-width:44px;flex-shrink:0;letter-spacing:.5px}
.sr-name{flex:1;font-size:12px;font-weight:600;letter-spacing:.3px;min-width:0}
.foil-tag{font-size:8px;letter-spacing:.8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:5px;
  background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(183,148,244,.15));
  border:1px solid rgba(255,215,0,.2);color:#ffd700;flex-shrink:0}

/* в•җв•җв•җ TAB BAR в•җв•җв•җ */
.tabs{display:flex;gap:5px;margin-bottom:10px}
.tab{
  flex:1;padding:8px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  cursor:pointer;font-family:'Rajdhani',sans-serif;transition:all .15s;border:1px solid #1a1a2e;background:#0d0d1e;color:#2a2a40}
.tab.on-g{background:rgba(255,180,0,.12);border-color:rgba(255,180,0,.35);color:#ffd700}
.tab.on-o{background:rgba(255,140,0,.12);border-color:rgba(255,140,0,.3);color:#ff8c00}

/* в•җв•җв•җ ACTION BTNS в•җв•җв•җ */
.action-row{display:flex;gap:7px;margin-bottom:10px}
.abtn{
  flex:1;padding:9px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  cursor:pointer;font-family:'Rajdhani',sans-serif;transition:all .12s;border:none}
.abtn:active{transform:scale(.97)}
.abtn-g{background:rgba(0,230,118,.1);border:1px solid rgba(0,230,118,.2);color:#00e676}
.abtn-r{background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.15);color:#ef5350}

/* в•җв•җв•җ DUPE CONTROLS в•җв•җв•җ */
.dc{display:flex;align-items:center;gap:4px;flex-shrink:0}
.dcb{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:16px;cursor:pointer;border:none;transition:all .1s;font-family:'Rajdhani',sans-serif}
.dcb:active{transform:scale(.85)}
.dcb-m{background:rgba(229,57,53,.18);color:#ef5350;border:1px solid rgba(229,57,53,.25)}
.dcb-p{background:rgba(0,230,118,.12);color:#00e676;border:1px solid rgba(0,230,118,.2)}
.dcn{min-width:26px;text-align:center;font-weight:700;font-size:14px;letter-spacing:.3px}

/* в•җв•җв•җ SEARCH в•җв•җв•җ */
.si-wrap{position:relative;margin-bottom:12px}
.si-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#2a2a40;font-size:15px;pointer-events:none}
.si{width:100%;padding:12px 14px 12px 40px;background:#0d0d1e;border:1px solid #1a1a2e;border-radius:10px;
  color:#e8eaf0;font-size:14px;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.3px;
  outline:none;transition:border-color .2s}
.si:focus{border-color:rgba(255,180,0,.35);box-shadow:0 0 0 3px rgba(255,180,0,.06)}
.si::placeholder{color:#1e1e30}
.empty{text-align:center;padding:50px 20px;color:#2a2a40}
.empty-ico{font-size:44px;opacity:.3;display:block;margin-bottom:14px}

/* в•җв•җв•җ DUPES PAGE в•җв•җв•җ */
.dupes-hero{
  background:linear-gradient(135deg,#140800,#1e0f00,#140800);
  border:1px solid rgba(255,140,0,.2);border-radius:12px;
  padding:14px;margin-bottom:10px}
.d-stats{display:flex;justify-content:space-around;text-align:center;align-items:center}
.d-n{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;line-height:1}
.d-l{font-size:8px;color:#3a2a10;letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.d-div{width:1px;background:#1e1500;align-self:stretch}

.dg-hdr{
  background:linear-gradient(135deg,#0d0d1e,#0f0f1a);border:1px solid #1a1a2e;
  border-radius:10px 10px 0 0;padding:10px 14px;margin-bottom:1px;
  display:flex;align-items:center;justify-content:space-between}
.di{display:flex;align-items:center;gap:10px;padding:9px 14px;background:#080812;border-bottom:1px solid #0d0d18}
.di:last-child{border-bottom:none;border-radius:0 0 10px 10px}

/* в•җв•җв•җ EXPORT BOX в•җв•җв•җ */
.export-box{
  background:linear-gradient(135deg,#080810,#0a0a14);
  border:1px solid rgba(255,180,0,.15);border-radius:12px;padding:14px;margin-top:10px}
.preview{background:#04040c;border:1px solid #111120;border-radius:8px;padding:10px 12px;
  margin-bottom:12px;max-height:90px;overflow-y:auto;font-family:monospace;font-size:9px;
  color:#2a2a40;word-break:break-all;line-height:1.9}
.ebtn-row{display:flex;gap:8px}
.ebtn{flex:1;padding:12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;
  font-family:'Bebas Neue',sans-serif;letter-spacing:2px;transition:all .12s;border:none}
.ebtn:active{transform:scale(.97)}
.ebtn-gold{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000}
.ebtn-dim{background:#0d0d1e;border:1px solid #1a1a2e;color:#3a3a55;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;font-size:12px}

/* в•җв•җв•җ TOAST в•җв•җв•җ */
#toast{
  position:fixed;bottom:76px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#ffd700,#ff8c00);
  color:#000;padding:9px 22px;border-radius:20px;
  font-weight:700;font-size:12px;letter-spacing:.3px;
  z-index:999;pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 20px rgba(255,180,0,.4);
  animation:fadeUp .18s ease}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* info hint box */
.hint{background:rgba(255,140,0,.06);border:1px solid rgba(255,140,0,.15);border-radius:8px;
  padding:9px 12px;margin-bottom:10px;font-size:11px;color:#3a3020;letter-spacing:.3px}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div id="hdr-icon">рҹҸҶ</div>
    <div id="hdr-title">
      <h1>MUNDIAL 2026</h1>
      <p>Caderneta Panini В· Luxemburgo</p>
    </div>
    <div id="hdr-right">
      <div id="hdr-pct">0%</div>
      <div id="hdr-count">0 / 980</div>
    </div>
  </div>
  <div id="pg"></div>
  <nav id="nav">
    <button class="nb on" data-v="dash" onclick="go('dash')"><span class="nb-ico">вҠһ</span><span>Resumo</span><div class="nb-bar"></div></button>
    <button class="nb" data-v="groups" onclick="go('groups')"><span class="nb-ico">рҹҸҶ</span><span>Grupos</span><div class="nb-bar"></div></button>
    <button class="nb" data-v="dupes" onclick="go('dupes')" id="nb-dupes"><span class="nb-ico">в§ү</span><span>Repetidos</span><div class="nb-bar"></div></button>
    <button class="nb" data-v="search" onclick="go('search')"><span class="nb-ico">рҹ”Қ</span><span>Pesquisa</span><div class="nb-bar"></div></button>
  </nav>
  <div id="toast" style="display:none"></div>
</div>

<script>
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// FULL REAL CHECKLIST вҖ” 980 stickers
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const STICKERS = [
// INTRO (FWC) вҖ” VersГЈo Europeia completa
{id:"00",name:"Panini Logo",team:"Intro",group:"FWC",foil:true},
{id:"FWC1",name:"Official Emblem",team:"Intro",group:"FWC",foil:true},
{id:"FWC2",name:"Official Emblem",team:"Intro",group:"FWC",foil:true},
{id:"FWC3",name:"Official Mascots",team:"Intro",group:"FWC",foil:true},
{id:"FWC4",name:"Official Slogan",team:"Intro",group:"FWC",foil:true},
{id:"FWC5",name:"Official Ball",team:"Intro",group:"FWC",foil:true},
{id:"FWC6",name:"Canada - Host Countries & Cities",team:"Intro",group:"FWC",foil:true},
{id:"FWC7",name:"Mexico - Host Countries & Cities",team:"Intro",group:"FWC",foil:true},
{id:"FWC8",name:"USA - Host Countries & Cities",team:"Intro",group:"FWC",foil:true},
// HistГіria do Mundial (versГЈo europeia вҖ” nГЈo existe na versГЈo americana)
{id:"FWC9",name:"Italy 1934 - World Cup History",team:"Intro",group:"FWC",foil:true},
{id:"FWC10",name:"Uruguay 1950 - World Cup History",team:"Intro",group:"FWC",foil:true},

const SK="wc26_v2_col", DK="wc26_v2_dup";
let col = new Set(JSON.parse(localStorage.getItem(SK)||"[]"));
let dup = JSON.parse(localStorage.getItem(DK)||"{}");
let view="dash", grp=null, team=null, ttab="col", toastT=null;

function sCol(){localStorage.setItem(SK,JSON.stringify([...col]));}
function sDup(){localStorage.setItem(DK,JSON.stringify(dup));}

function tap(id){
  col.has(id)?col.delete(id):col.add(id);
  sCol(); hdr(); render();
  toastShow(col.has(id)?"вң“ Colado!":"Removido");
}
function setD(id,n){if(n<=0)delete dup[id];else dup[id]=n; sDup(); hdr(); render();}

function td(){return Object.values(dup).reduce((a,b)=>a+b,0);}
function gSum(g){
  const s=STICKERS.filter(x=>x.group===g);
  return{n:s.length,h:s.filter(x=>col.has(x.id)).length,d:s.reduce((a,x)=>a+(dup[x.id]||0),0)};
}
function tStk(t){return STICKERS.filter(s=>s.team===t);}
function p(){return col.size/TOTAL;}

function toastShow(m){
  const e=document.getElementById("toast");
  e.textContent=m;e.style.display="block";
  clearTimeout(toastT);toastT=setTimeout(()=>e.style.display="none",1500);
}

function hdr(){
  const have=col.size,d=td();
  document.getElementById("hdr-pct").textContent=Math.round(p()*100)+"%";
  document.getElementById("hdr-count").textContent=`${have} / ${TOTAL}`+(d>0?` В· в§ү${d}`:"");
}

function go(v,g,t){
  view=v; grp=g||grp; team=t||null;
  if(v==="team")ttab="col";
  document.querySelectorAll(".nb").forEach(b=>{
    const on=b.dataset.v===v||(v==="grp"&&b.dataset.v==="groups")||(v==="team"&&b.dataset.v==="groups");
    b.classList.toggle("on",on);
    b.querySelector(".nb-bar").style.display=on?"block":"none";
  });
  const d=td();
  document.getElementById("nb-dupes").querySelector("span:last-of-type").textContent=
    d>0?`Rep.(${d})`:"Repetidos";
  render();
  document.getElementById("pg").scrollTop=0;
  window.scrollTo(0,0);
}

// в•җв•җв•җ RENDER HELPERS в•җв•җв•җ
function ring(pv,sz,sw,c){
  const r=(sz-sw)/2,ci=2*Math.PI*r,d=ci*Math.min(pv,1);
  return`<svg width="${sz}" height="${sz}" style="transform:rotate(-90deg);display:block">
    <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="${sw}"/>
    <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${c}" stroke-width="${sw}"
      stroke-dasharray="${d} ${ci}" stroke-linecap="round"
      style="transition:stroke-dasharray .5s ease;filter:drop-shadow(0 0 8px ${c}99)"/>
  </svg>`;
}
function pb(h,n,c){const w=n>0?Math.round(h/n*100):0;return`<div class="pb"><div class="pf" style="width:${w}%;background:${c}"></div></div>`;}
function pill(t,cl){return`<span class="pill ${cl}">${t}</span>`;}
function dc(id){
  const n=dup[id]||0,c=n>0?"#ff8c00":"#1e1e30";
  return`<div class="dc">
    <button class="dcb dcb-m" onclick="event.stopPropagation();setD('${id}',${n-1})">вҲ’</button>
    <span class="dcn" style="color:${c}">${n}</span>
    <button class="dcb dcb-p" onclick="event.stopPropagation();setD('${id}',${n+1})">+</button>
  </div>`;
}

function vDash(){
  const have=col.size,need=TOTAL-have,d=td(),pv=p();
  const gc=pv===1?"#00e676":"#ffd700";
  const specH=STICKERS.filter(s=>s.foil&&col.has(s.id)).length;
  const specN=STICKERS.filter(s=>s.foil).length;
  // group grid
  const gg=Object.keys(GROUPS).filter(k=>k!=="FWC").map(k=>{
    const{h,n,d:dd}=gSum(k);
    const gp=h/n,gc2=gp===1?"#00e676":"#ffd700";
    return`<div class="gt${gp===1?' done':''}" style="--tc:${gc2}" onclick="go('grp','${k}')">
      <div class="gt-l" style="color:${gc2}">${gp===1?"вң“":k}</div>
      <div class="gt-s">${h}/${n}</div>
      ${dd>0?`<div class="gt-d">в§ү${dd}</div>`:""}
      ${pb(h,n,gp===1?"#00e676":"#ffd700")}
    </div>`;

  const iS=STICKERS.filter(s=>s.group==="FWC");
  const iH=iS.filter(s=>col.has(s.id)).length;
  return`
  <div class="hero">
    <div class="hero-top">
      <div class="hero-ring-wrap">
        <div>${ring(pv,106,8,gc)}</div>
        <div class="ring-text">
          <div class="ring-pct">${Math.round(pv*100)}%</div>

        </div>

          <span class="hero-stat-val" style="color:#00e676">${have}</span>
          <span class="hero-stat-lbl">colados</span>
        </div>
        <div class="hero-stat-row">
          <span class="hero-stat-val" style="color:#ef5350">${need}</span>
          <span class="hero-stat-lbl">em falta</span>
        </div>
        <div class="hero-stat-row">
          <span class="hero-stat-val" style="color:#ffd700">${TOTAL}</span>
          <span class="hero-stat-lbl">total</span>
        </div>
      </div>
    </div>
    <div class="hero-pills">
      ${pill("вң“ "+have+" colados","pill-g")}
      ${pill("вң— "+need+" em falta","pill-r")}
      ${d>0?pill("в§ү "+d+" repetidos","pill-o"):""}
    </div>
  </div>

  <div class="stat-row">
    <div class="stat-box">
      <div class="stat-ico">вӯҗ</div>
      <div><div class="stat-n" style="color:#ffd700">${specH}<span style="font-size:13px;color:#2a2a40">/${specN}</span></div><div class="stat-l">Foil</div></div>
    </div>
    <div class="stat-box clickable" onclick="go('dupes')">
      <div class="stat-ico">в§ү</div>
      <div><div class="stat-n" style="color:#ff8c00">${d}</div><div class="stat-l">Repetidos вҶ’</div></div>
    </div>
  </div>

  <div class="sh"><div class="sh-txt">Intro / FWC</div><div class="sh-line"></div></div>
  <div style="margin-bottom:10px;background:#0d0d1e;border:1px solid #1a1a2e;border-radius:10px;padding:10px 14px;cursor:pointer" onclick="go('grp','FWC')">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:13px;font-weight:600">рҹҢҚ IntroduГ§ГЈo / HistГіria Mundial</span>
      <span style="font-size:12px;color:#2a2a40">${iH}/${iS.length} вҶ’</span>
    </div>

function vGroups(){
  return`<div class="sh" style="margin-bottom:10px"><div class="sh-txt">Seleciona um Grupo</div><div class="sh-line"></div></div>`+
  Object.entries(GROUPS).map(([k,{name,teams}])=>{

          <div class="li-sc">${h}/${n}</div>

function vGrp(){
  const g=GROUPS[grp];

  teams.map(t=>{
    const ts=tStk(t);
    const th=ts.filter(s=>col.has(s.id)).length;
    const tdp=ts.reduce((a,s)=>a+(dup[s.id]||0),0);
    const gc2=th===ts.length?"#00e676":"#ffd700";
    const sf=TEAM_FLAGS[t]||"";
    const ss=t.replace(/'/g,"\\'");
    return`<div class="tc" onclick="go('team','${grp}','${ss}')">
      <div class="tc-flag">${sf}</div>
      <div class="tc-body">
        <div class="tc-name">${t}${tdp>0?`<span class="tc-dp">в§ү${tdp}</span>`:""}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1">${pb(th,ts.length,gc2)}</div>
          <span style="font-size:10px;color:#2a2a40">${th}/${ts.length}</span>
        </div>

      <div class="tc-arr">вҖә</div>

function vTeam(){
  const g=GROUPS[grp];
  const ts=tStk(team);
  const th=ts.filter(s=>col.has(s.id)).length;
  const tdp=ts.reduce((a,s)=>a+(dup[s.id]||0),0);
  const gc2=th===ts.length?"#00e676":"#ffd700";
  const sf=TEAM_FLAGS[team]||"";

  const rows=ttab==="col"
    ?ts.map(s=>{
        const h=col.has(s.id);
        let dc_cls=h?"h":"m";
        if(!h&&s.foil)dc_cls="mf";
        if(h&&s.foil)dc_cls="h";
        return`<div class="sr ${h?"have":"miss"}" onclick="tap('${s.id}')">
          <div class="sd ${dc_cls}">${h?"вң“":s.foil?"вҳ…":""}</div>
          <span class="sr-id">${s.id}</span>
          <span class="sr-name">${s.name}${s.foil?'<span class="foil-tag">FOIL</span>':""}</span>
        </div>`;
      }).join("")
    :ts.map(s=>{
        const n=dup[s.id]||0;
        return`<div class="sr ${n>0?"dup":"miss"}">
          <div class="sd ${n>0?"h":"m"}" style="${n>0?"background:rgba(255,140,0,.18);border-color:rgba(255,140,0,.4);color:#ff8c00":""}">${n>0?n:""}</div>
          <span class="sr-id">${s.id}</span>
          <span class="sr-name">${s.name}${s.foil?'<span class="foil-tag">FOIL</span>':""}</span>
          ${dc(s.id)}
        </div>`;
      }).join("");

  return`<button class="back" onclick="go('grp','${grp}')">вҶҗ ${GROUPS[grp].name}</button>
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
    <span style="font-size:32px">${sf}</span>
    <div style="flex:1">
      <div class="page-hd" style="margin-bottom:3px">${team}</div>
      <div style="font-size:11px;color:#2a2a40">${th}/${ts.length} colados${tdp>0?` В· <span style="color:#ff8c00">в§ү${tdp}</span>`:""}</div>
    </div>
    <div style="position:relative;flex-shrink:0">
      ${ring(th/ts.length,48,5,gc2)}
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:${gc2}">${th}</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab ${ttab==="col"?"on-g":""}" onclick="ttab='col';render()">рҹ“Ӣ ColeГ§ГЈo</button>
    <button class="tab ${ttab==="dup"?"on-o":""}" onclick="ttab='dup';render()">в§ү Repetidos</button>
  </div>
  ${ttab==="col"?`<div class="action-row">
    <button class="abtn abtn-g" onclick="ts_all()">вң“ Marcar todos</button>
    <button class="abtn abtn-r" onclick="ts_clear()">вң— Limpar todos</button>
  </div>`:`<div class="hint">Usa + / вҲ’ para registar cromos para trocar.</div>`}
  ${rows}`;
}

function ts_all(){tStk(team).forEach(s=>{if(!col.has(s.id))col.add(s.id);});sCol();hdr();render();}
function ts_clear(){tStk(team).forEach(s=>col.delete(s.id));sCol();hdr();render();}

function vDupes(){

      <div style="font-size:11px;color:#2a2a40">Vai a cada equipa вҶ’ separador Repetidos</div>
    </div>`;

  const byG={};
  dl.forEach(s=>{if(!byG[s.group])byG[s.group]=[];byG[s.group].push(s);});
  const sh=dl.map(s=>`${s.id}(x${dup[s.id]})`).join(" ");

  return`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div>
      <div class="page-hd" style="margin-bottom:2px">в§ү REPETIDOS</div>
      <div style="font-size:11px;color:#2a2a40">${d} cromos para trocar</div>
    </div>
    <button onclick="if(confirm('Limpar todos?')){dup={};sDup();hdr();render()}"
      style="padding:7px 12px;background:rgba(229,57,53,.1);border:1px solid rgba(229,57,53,.2);border-radius:7px;color:#ef5350;font-size:10px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;letter-spacing:.5px">

  <div class="dupes-hero">

      <div class="d-div"></div>
      <div><div class="d-n" style="color:#ffd700">${dl.length}</div><div class="d-l">Tipos</div></div>
      <div class="d-div"></div>
      <div><div class="d-n" style="color:#b794f4">${Math.max(0,...Object.values(dup))}</div><div class="d-l">MГЎx.</div></div>
    </div>
  </div>

  ${Object.entries(byG).map(([gk,stks])=>{
    const gt=stks.reduce((a,s)=>a+(dup[s.id]||0),0);
    return`<div style="margin-bottom:8px">
      <div class="dg-hdr">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:#ffd700">${GROUPS[gk]?.name||gk}</span>
        <span class="pill pill-o">в§ү ${gt}</span>
      </div>
      ${stks.map(s=>{
        const n=dup[s.id]||0,sf=TEAM_FLAGS[s.team]||"";
        return`<div class="di">
          <span style="font-size:15px;min-width:22px">${sf}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:700;color:#e8eaf0">${s.name}</div>
            <div style="font-size:9px;color:#2a2a40;margin-top:1px">${s.id} В· ${s.team}</div>
          </div>
          ${dc(s.id)}
        </div>`;
      }).join("")}
    </div>`;
  }).join("")}

  <div class="export-box">
    <div class="sh" style="margin-bottom:10px"><div class="sh-txt">Exportar</div><div class="sh-line"></div></div>
    <div class="preview">${dl.map(s=>`<span style="color:#ff8c00">x${dup[s.id]}</span> <span style="color:#4a5a70">${s.id}</span> ${s.name} В· `).join("")}</div>
    <div class="ebtn-row">
      <button class="ebtn ebtn-gold" onclick="dlTxt()">рҹ“Ҙ DOWNLOAD .TXT</button>
      <button class="ebtn ebtn-dim" onclick="navigator.clipboard?.writeText(${JSON.stringify(sh)});toastShow('Copiado! рҹ“Ӣ')">рҹ“Ӣ Copiar</button>
    </div>
  </div>`;
}

function vSearch(){
  const q=document.getElementById("si")?.value||"";
  const res=q.trim().length>=2
    ?STICKERS.filter(s=>s.name.toLowerCase().includes(q.toLowerCase())||s.id.toLowerCase().includes(q.toLowerCase())||s.team.toLowerCase().includes(q.toLowerCase())).slice(0,50)
    :[];

  const rows=res.map(s=>{
    const h=col.has(s.id),n=dup[s.id]||0;
    let dc_cls=h?"h":(s.foil?"mf":"m");
    return`<div style="background:#0d0d1e;border:1px solid #1a1a2e;border-radius:9px;padding:10px 12px;margin-bottom:5px">
      <div class="sr ${h?"have":"miss"}" style="margin:0;padding:0;border:none;background:none" onclick="tap('${s.id}')">
        <div class="sd ${dc_cls}">${h?"вң“":s.foil?"вҳ…":""}</div>
        <span class="sr-id">${s.id}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:700">${s.name}${s.foil?'<span class="foil-tag">FOIL</span>':""}</div>
          <div style="font-size:9px;color:#2a2a40">${s.team}${s.group!=="FWC"?" В· Grupo "+s.group:""}</div>
        </div>
        ${h&&n>0?`<span class="pill pill-o" style="font-size:9px">в§ү${n}</span>`:""}
      </div>
      ${h?`<div style="display:flex;align-items:center;justify-content:space-between;margin-top:7px;padding-top:7px;border-top:1px solid #0d0d18">
        <span style="font-size:10px;color:#2a2a40">Repetidos:</span>${dc(s.id)}
      </div>`:""}

  }).join("");

  return`<div class="si-wrap"><span class="si-ico">рҹ”Қ</span>
    <input id="si" class="si" placeholder="Nome, cГіdigo ou equipaвҖҰ" value="${q.replace(/"/g,'&quot;')}" oninput="render()" autocomplete="off"/></div>
  ${q.trim().length<2
    ?`<div class="empty"><span class="empty-ico">вҡҪ</span><div style="font-size:13px;font-weight:600">Escreve para pesquisar</div><div style="font-size:10px;margin-top:6px;color:#1e1e30">Nome, cГіdigo (ex: POR15) ou equipa</div></div>`
    :res.length===0?`<div style="text-align:center;padding:24px;color:#2a2a40;font-size:13px">Sem resultados</div>`:rows}`;
}

function dlTxt(){
  const dl=STICKERS.filter(s=>(dup[s.id]||0)>0);
  const byG={};
  dl.forEach(s=>{if(!byG[s.group])byG[s.group]=[];byG[s.group].push(s);});
  const ls=["в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ",
    "   MUNDIAL 2026 вҖ” CROMOS REPETIDOS",
    "в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ",
    `   ${new Date().toLocaleDateString("pt-PT")}   |   ${td()} cromos В· ${dl.length} tipos`,
    ""];
  Object.entries(byG).forEach(([gk,ss])=>{
    ls.push(`в”Җв”Җв”Җ ${GROUPS[gk]?.name||gk} (${ss.reduce((a,s)=>a+(dup[s.id]||0),0)}) в”Җв”Җв”Җ`);
    ss.forEach(s=>ls.push(`  [x${String(dup[s.id]).padStart(2)}]  ${s.id.padEnd(6)}  ${s.name}  (${s.team})`));
    ls.push("");
  });
  ls.push("в”Җв”Җв”Җ Lista compacta в”Җв”Җв”Җ");
  ls.push(dl.map(s=>`${s.id}(x${dup[s.id]})`).join(" "));
  const blob=new Blob([ls.join("\n")],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`repetidos_mundial2026_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  toastShow("рҹ“Ҙ Ficheiro descarregado!");
}

// в•җв•җв•җ MAIN в•җв•җв•җ
function render(){
  let h="";
  if(view==="dash")h=vDash();
  else if(view==="groups")h=vGroups();
  else if(view==="grp")h=vGrp();
  else if(view==="team")h=vTeam();
  else if(view==="dupes")h=vDupes();
  else if(view==="search")h=vSearch();
  document.getElementById("pg").innerHTML=h;
  if(view==="search"){
    const i=document.getElementById("si");
    if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}
  }
}

hdr(); render();

let installPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  installPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
  installPrompt = null;
  toastShow('вң“ App instalada!');
});

function installApp() {
  if (installPrompt) {
    installPrompt.prompt();
    installPrompt.userChoice.then(r => {
      if (r.outcome === 'accepted') {
        document.getElementById('install-banner').style.display = 'none';
      }
      installPrompt = null;
    });
  }
}
